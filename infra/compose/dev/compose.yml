services:
  postgres:
    image: postgres:17-alpine
    env_file:
      - ../../env/dev/app.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  api:
    build:
      context: ../../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../env/dev/app.env
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - postgres

  web:
    build:
      context: ../../..
      dockerfile: apps/web/Dockerfile
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api

  worker:
    profiles:
      - worker
    build:
      context: ../../..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../../env/dev/app.env
    depends_on:
      - postgres

  migrator:
    profiles:
      - migrator
    build:
      context: ../../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../env/dev/app.env
    depends_on:
      - postgres
    entrypoint: ["/usr/local/bin/uamappers-migrator"]

volumes:
  postgres_data:
