services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - app.env
    volumes:
      - uamappers_prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

  api:
    image: ${UAMAPPERS_API_IMAGE:?UAMAPPERS_API_IMAGE is required}
    restart: unless-stopped
    env_file:
      - app.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8080/system/health >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.uamappers-prod-api.rule=Host(`${PROD_API_HOST}`)"
      - "traefik.http.routers.uamappers-prod-api.entrypoints=websecure"
      - "traefik.http.routers.uamappers-prod-api.tls=true"
      - "traefik.http.services.uamappers-prod-api.loadbalancer.server.port=8080"
    networks:
      - internal
      - traefik-public

  web:
    image: ${UAMAPPERS_WEB_IMAGE:?UAMAPPERS_WEB_IMAGE is required}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.uamappers-prod-web.rule=Host(`${PROD_WEB_HOST}`)"
      - "traefik.http.routers.uamappers-prod-web.entrypoints=websecure"
      - "traefik.http.routers.uamappers-prod-web.tls=true"
      - "traefik.http.services.uamappers-prod-web.loadbalancer.server.port=80"
    networks:
      - internal
      - traefik-public

  migrator:
    image: ${UAMAPPERS_API_IMAGE:?UAMAPPERS_API_IMAGE is required}
    restart: "no"
    env_file:
      - app.env
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/uamappers-migrator"]
    networks:
      - internal

volumes:
  uamappers_prod_postgres_data:
    name: uamappers_prod_postgres_data

networks:
  internal:
    name: uamappers-prod-internal
  traefik-public:
    external: true
