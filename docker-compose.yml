services:
  postgres:
    image: postgres:17.7-alpine
    environment:
      POSTGRES_DB: uamappers
      POSTGRES_USER: uamappers
      POSTGRES_PASSWORD: uamappers
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgres://uamappers:uamappers@postgres:5432/uamappers
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgres://uamappers:uamappers@postgres:5432/uamappers
    depends_on:
      - postgres

volumes:
  postgres_data:
