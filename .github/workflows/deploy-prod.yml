name: Deploy Prod

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-features --all-targets
      - uses: oven-sh/setup-bun@v2
      - name: bun install
        run: bun install --frozen-lockfile
      - name: bun run typecheck
        run: bun run --cwd apps/web typecheck

  build-and-push:
    name: Build and Push ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        include:
          - image: api
            dockerfile: apps/api/Dockerfile
            scope: uamappers-api
          - image: worker
            dockerfile: apps/worker/Dockerfile
            scope: uamappers-worker
          - image: web
            dockerfile: apps/web/Dockerfile
            scope: uamappers-web
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        run: |
          OWNER_LC=$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="sha-${GITHUB_SHA}"
          IMAGE_NAME="uamappers-${{ matrix.image }}"

          docker buildx build \
            --platform linux/amd64 \
            --file ${{ matrix.dockerfile }} \
            --cache-from type=gha,scope=${{ matrix.scope }} \
            --cache-to type=gha,mode=max,scope=${{ matrix.scope }} \
            --tag ${{ env.REGISTRY }}/${OWNER_LC}/${IMAGE_NAME}:${IMAGE_TAG} \
            --tag ${{ env.REGISTRY }}/${OWNER_LC}/${IMAGE_NAME}:latest \
            --push \
            .

  deploy:
    name: Deploy to VPS (Prod)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Validate production environment secrets
        env:
          PROD_VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          PROD_VPS_PORT: ${{ secrets.PROD_VPS_PORT }}
          PROD_VPS_USER: ${{ secrets.PROD_VPS_USER }}
          PROD_VPS_SSH_KEY: ${{ secrets.PROD_VPS_SSH_KEY }}
          PROD_GHCR_PULL_USER: ${{ secrets.PROD_GHCR_PULL_USER }}
          PROD_GHCR_PULL_TOKEN: ${{ secrets.PROD_GHCR_PULL_TOKEN }}
        run: |
          : "${PROD_VPS_HOST:?production secret PROD_VPS_HOST is required}"
          : "${PROD_VPS_USER:?production secret PROD_VPS_USER is required}"
          : "${PROD_VPS_SSH_KEY:?production secret PROD_VPS_SSH_KEY is required}"
          : "${PROD_GHCR_PULL_USER:?production secret PROD_GHCR_PULL_USER is required}"
          : "${PROD_GHCR_PULL_TOKEN:?production secret PROD_GHCR_PULL_TOKEN is required}"
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          VPS_PORT: ${{ secrets.PROD_VPS_PORT }}
          VPS_USER: ${{ secrets.PROD_VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.PROD_VPS_SSH_KEY }}
        run: |
          VPS_PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts
      - name: Ensure prod directory on VPS
        env:
          VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          VPS_PORT: ${{ secrets.PROD_VPS_PORT }}
          VPS_USER: ${{ secrets.PROD_VPS_USER }}
          STACK_DIR: ${{ vars.UAMAPPERS_STACK_DIR || '/opt/uamappers/prod' }}
        run: |
          VPS_PORT="${VPS_PORT:-22}"
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$STACK_DIR'"
      - name: Sync deploy files
        env:
          VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          VPS_PORT: ${{ secrets.PROD_VPS_PORT }}
          VPS_USER: ${{ secrets.PROD_VPS_USER }}
          STACK_DIR: ${{ vars.UAMAPPERS_STACK_DIR || '/opt/uamappers/prod' }}
        run: |
          VPS_PORT="${VPS_PORT:-22}"
          scp -P "$VPS_PORT" infra/compose/prod/compose.yml "$VPS_USER@$VPS_HOST:$STACK_DIR/compose.yml"
          scp -P "$VPS_PORT" infra/compose/prod/compose.worker.yml "$VPS_USER@$VPS_HOST:$STACK_DIR/compose.worker.yml"
          scp -P "$VPS_PORT" scripts/deploy_prod.sh "$VPS_USER@$VPS_HOST:$STACK_DIR/deploy_prod.sh"
          scp -P "$VPS_PORT" scripts/run_weekly_worker.sh "$VPS_USER@$VPS_HOST:$STACK_DIR/run_weekly_worker.sh"
      - name: Run production deploy
        env:
          VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          VPS_PORT: ${{ secrets.PROD_VPS_PORT }}
          VPS_USER: ${{ secrets.PROD_VPS_USER }}
          GHCR_PULL_USER: ${{ secrets.PROD_GHCR_PULL_USER }}
          GHCR_PULL_TOKEN: ${{ secrets.PROD_GHCR_PULL_TOKEN }}
          OWNER_LC: ${{ github.repository_owner }}
          IMAGE_TAG: sha-${{ github.sha }}
          STACK_DIR: ${{ vars.UAMAPPERS_STACK_DIR || '/opt/uamappers/prod' }}
        run: |
          VPS_PORT="${VPS_PORT:-22}"
          OWNER_LC_LC=$(printf '%s' "$OWNER_LC" | tr '[:upper:]' '[:lower:]')
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "set -eu; \
            cd '$STACK_DIR'; \
            chmod +x deploy_prod.sh run_weekly_worker.sh; \
            echo '$GHCR_PULL_TOKEN' | docker login ghcr.io -u '$GHCR_PULL_USER' --password-stdin; \
            UAMAPPERS_API_IMAGE=ghcr.io/$OWNER_LC_LC/uamappers-api:$IMAGE_TAG \
            UAMAPPERS_WEB_IMAGE=ghcr.io/$OWNER_LC_LC/uamappers-web:$IMAGE_TAG \
            UAMAPPERS_WORKER_IMAGE=ghcr.io/$OWNER_LC_LC/uamappers-worker:$IMAGE_TAG \
            STACK_DIR='$STACK_DIR' \
            COMPOSE_PROJECT_NAME=uamappers-prod \
            ./deploy_prod.sh"
