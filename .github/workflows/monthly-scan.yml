name: Monthly UA Mapper Scan

on:
  schedule:
    # Once per month. Uses UTC.
    - cron: "0 3 1 * *"
  workflow_dispatch:

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && vars.UAMAPPERS_ENV == 'prod' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
      - uses: Swatinem/rust-cache@v2
      - name: Run worker
        env:
          UAMAPPERS_ENV: ${{ vars.UAMAPPERS_ENV }}
          RUST_LOG: info

          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}

          OSU_CLIENT_ID: ${{ secrets.OSU_CLIENT_ID }}
          OSU_CLIENT_SECRET: ${{ secrets.OSU_CLIENT_SECRET }}

          # Run discovery + enrich in one shot (restart-safe via scan_state table).
          RUN_DISCOVERY: "1"
          ENRICH_USERS: "1"
          ENRICH_BEATMAPSETS: "1"
        run: cargo run -p uamappers-worker --release

